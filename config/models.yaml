# config/models.yaml
#
# Model configuration for the Local AI Orchestrator.
# Change active_profile to swap models without editing Python code.

provider: ollama

ollama:
  base_url: "http://localhost:11434"
  keep_alive: "5m"
  request_timeout: 600

# Options: bootstrap | serious | coding | fast | low_memory
active_profile: serious

# See docs/model-profiles.md for the memory-budget rationale behind these
# assignments. Every profile below must reference at most one distinct
# 14B-class model family (tests/test_model_config.py enforces this) — a
# 24GB MacBook cannot keep two 14B-class models resident at once, so mixing
# them within a profile causes Ollama to repeatedly swap models to disk.
profiles:
  bootstrap:
    supervisor: "llama3.2:3b"
    planner: "llama3.2:3b"
    builder: "llama3.2:3b"
    critic: "llama3.2:3b"
    fixer: "llama3.2:3b"
    judge: "llama3.2:3b"
    synthesizer: "llama3.2:3b"

  serious:
    supervisor: "llama3.1:8b"
    planner: "llama3.1:8b"
    builder: "qwen2.5:14b"
    critic: "llama3.1:8b"
    fixer: "qwen2.5:14b"
    judge: "qwen2.5:14b"
    synthesizer: "qwen2.5:14b"

  coding:
    supervisor: "llama3.1:8b"
    planner: "llama3.1:8b"
    builder: "qwen2.5-coder:14b"
    critic: "llama3.1:8b"
    fixer: "qwen2.5-coder:14b"
    judge: "qwen2.5-coder:14b"
    synthesizer: "llama3.1:8b"

  fast:
    supervisor: "llama3.2:3b"
    planner: "llama3.2:3b"
    builder: "llama3.1:8b"
    critic: "llama3.2:3b"
    fixer: "llama3.1:8b"
    judge: "llama3.1:8b"
    synthesizer: "llama3.1:8b"

  low_memory:
    supervisor: "llama3.2:3b"
    planner: "llama3.2:3b"
    builder: "llama3.1:8b"
    critic: "llama3.2:3b"
    fixer: "llama3.1:8b"
    judge: "llama3.2:3b"
    synthesizer: "llama3.1:8b"

# Known limitation (see docs/model-profiles.md): these overrides apply
# regardless of active_profile. If active_profile is "serious" and a goal
# is classified mode="coding", builder/fixer switch to qwen2.5-coder:14b
# while judge/synthesizer stay on serious's qwen2.5:14b — reintroducing two
# resident 14B-class families for that run. Fixing this fully would mean
# threading mode into profile selection, which is out of this phase's scope.
mode_overrides:
  coding:
    builder: "qwen2.5-coder:14b"
    fixer: "qwen2.5-coder:14b"
  debugging:
    builder: "qwen2.5-coder:14b"
    fixer: "qwen2.5-coder:14b"

paths:
  fast:
    skip_planner: true
    skip_critic_fixer_loop: true
    max_loops: 1
    threshold: 60
  normal:
    skip_planner: false
    skip_critic_fixer_loop: false
    max_loops: 2
    threshold: 70
  deep:
    skip_planner: false
    skip_critic_fixer_loop: false
    max_loops: 4
    threshold: 80

defaults:
  temperature: 0.7
  num_ctx: 4096

# Per-profile context window override, read via
# orchestrator.config_loader.get_num_ctx_for_profile(). Falls back to
# defaults.num_ctx above for any profile not listed here. Larger num_ctx
# multiplies KV cache memory use, so low_memory intentionally uses a much
# smaller window than serious/coding.
context_sizes:
  bootstrap: 4096
  fast: 4096
  serious: 8192
  coding: 8192
  low_memory: 2048

memory:
  keep_alive: "5m"
  # Phase 9 — retrieval, opt-in and off by default. Retrieval changes what
  # context the model sees, so it must never activate silently. Requires
  # `ollama pull nomic-embed-text` locally before enabling -- this project
  # never pulls a model automatically.
  retrieval_enabled: false
  embedding_model: "nomic-embed-text"
  top_k: 5
  chunk_size_tokens: 512

resilience:
  timeouts:
    default: 600
    small: 120    # e.g. llama3.2:3b class
    medium: 300   # e.g. llama3.1:8b, gemma3:12b class
    large: 600    # e.g. qwen2.5:14b, qwen2.5-coder:14b, phi4:14b class
  fallback_model: "llama3.2:3b"
  max_local_retries: 1
  cloud_backoff:
    base_seconds: 1
    max_seconds: 30
    max_retries: 4

# Phase 7 — optional cloud fallback scaffolding. `enabled: false` is the
# only value that matters on first read: everything else here is inert
# until that's flipped, and even then a real call also requires the
# --allow-cloud CLI flag, an allow-listed role, a passing budget check,
# and interactive human approval (see orchestrator/cloud_policy.py). The
# model ID and pricing below are placeholders carried from the Phase 7
# research report and have NOT been verified against the provider's
# current published documentation -- orchestrator/adapters.py's
# AnthropicAdapter deliberately still raises NotImplementedError until
# that verification happens. Do not treat this pricing as accurate.
cloud:
  enabled: false
  provider: anthropic
  model: "claude-sonnet-5"
  allowed_roles: ["judge", "synthesizer"]
  require_approval: true
  send_full_project_state: false
  budget:
    per_run_usd: 0.25
    daily_usd: 2.00
    monthly_usd: 20.00
    block_over_budget: true
  pricing:
    input_per_million_usd: 2.00
    output_per_million_usd: 10.00

# Phase 10 — deep research and internet connection, opt-in and off by
# default. Internet access must never happen just because this code
# exists: a real search/fetch requires BOTH internet_enabled: true here
# AND the --enable-research CLI flag (research/run_research.py). Even
# with both set, search_provider: "mock" (the default) means no real
# network call happens until a real provider is explicitly configured.
# respect_robots_txt is a hard rule for this project, not a toggle to
# flip off casually -- only search_provider/max_sources/timeouts are
# meant to be tuned.
research:
  internet_enabled: false
  search_provider: "mock"
  max_sources: 8
  fetch_timeout_seconds: 15
  max_fetch_bytes: 2000000
  respect_robots_txt: true
  user_agent: "LocalAIOrchestratorResearchBot/0.1"
