# config/models.yaml
#
# Model configuration for the Local AI Orchestrator.
# Change active_profile to swap models without editing Python code.

provider: ollama

ollama:
  base_url: "http://localhost:11434"
  keep_alive: "5m"
  request_timeout: 600

# Options: bootstrap | serious | coding | fast
active_profile: serious

profiles:
  bootstrap:
    supervisor: "llama3.2:3b"
    planner: "llama3.2:3b"
    builder: "llama3.2:3b"
    critic: "llama3.2:3b"
    fixer: "llama3.2:3b"
    judge: "llama3.2:3b"
    synthesizer: "llama3.2:3b"

  serious:
    supervisor: "llama3.1:8b"
    planner: "llama3.1:8b"
    builder: "qwen2.5:14b"
    critic: "gemma3:12b"
    fixer: "qwen2.5:14b"
    judge: "phi4:14b"
    synthesizer: "qwen2.5:14b"

  coding:
    supervisor: "llama3.1:8b"
    planner: "llama3.1:8b"
    builder: "qwen2.5-coder:14b"
    critic: "gemma3:12b"
    fixer: "qwen2.5-coder:14b"
    judge: "phi4:14b"
    synthesizer: "qwen2.5:14b"

  fast:
    supervisor: "llama3.2:3b"
    planner: "llama3.2:3b"
    builder: "llama3.1:8b"
    critic: "llama3.2:3b"
    fixer: "llama3.1:8b"
    judge: "llama3.1:8b"
    synthesizer: "llama3.1:8b"

mode_overrides:
  coding:
    builder: "qwen2.5-coder:14b"
    fixer: "qwen2.5-coder:14b"
  debugging:
    builder: "qwen2.5-coder:14b"
    fixer: "qwen2.5-coder:14b"

paths:
  fast:
    skip_planner: true
    skip_critic_fixer_loop: true
    max_loops: 1
    threshold: 60
  normal:
    skip_planner: false
    skip_critic_fixer_loop: false
    max_loops: 2
    threshold: 70
  deep:
    skip_planner: false
    skip_critic_fixer_loop: false
    max_loops: 4
    threshold: 80

defaults:
  temperature: 0.7
  num_ctx: 4096

memory:
  keep_alive: "5m"

resilience:
  timeouts:
    default: 600
    small: 120    # e.g. llama3.2:3b class
    medium: 300   # e.g. llama3.1:8b, gemma3:12b class
    large: 600    # e.g. qwen2.5:14b, qwen2.5-coder:14b, phi4:14b class
  fallback_model: "llama3.2:3b"
  max_local_retries: 1
  cloud_backoff:
    base_seconds: 1
    max_seconds: 30
    max_retries: 4
